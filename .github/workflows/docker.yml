name: Build and Push Docker Image

on:
  push:
    branches: [main]          # triggers on every push to main
    paths-ignore:
      - 'README.md'
      - 'MAINTAINERS.md'

jobs:
  build:
    runs-on: self-hosted      # runs on YOUR machine (has the bags)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/slam-suite:latest
            ghcr.io/${{ github.repository_owner }}/slam-suite:${{ github.sha }}
